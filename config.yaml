# OCI Drawing Agent — configuration
# Auth uses OCI Instance Principal; no credentials stored here.

# Fleet identity
agent_id: "agent3-oci-drawing"
fleet:
  fleet_id: "oci-agent-fleet"
  position: 3
  total_agents: 7
  upstream:   ["agent2-bom-sizing"]
  downstream: ["agent4-pov-document", "agent5-jep-document", "agent6-sizing-validation", "agent7-terraform"]

# OCI region (must match inference model OCID region)
region: "us-chicago-1"

# Legacy ADK agent endpoint (kept for reference; not used when inference.enabled=true)
agent_endpoint_id: "ocid1.genaiagentendpoint.oc1.phx.amaaaaaaqx2yg4ya76r5ojh7olsu5uxpe4bmmslfrpylfcrwezgms5azbppa"

# Compartment
compartment_id: "ocid1.compartment.oc1..aaaaaaaaea7vtpk24oq7tw6sfskc2hodr2ymbchddlblb6qqpad6rgt2fkwa"

# LLM call config (ADK path)
max_steps: 5

# OCI GenAI Inference (direct SDK, replaces ADK Agent Endpoint)
inference:
  enabled: true
  service_endpoint: "https://inference.generativeai.us-chicago-1.oci.oraclecloud.com"
  model_id: "ocid1.generativeaimodel.oc1.us-chicago-1.amaaaaaask7dceyadd6ow2hxfppx7dmwmok4pon2jtsw2m2wiwoplexjrqaq"
  max_tokens: 2000
  temperature: 0.0
  top_p: 0.9
  top_k: 0
  # System prompt — injected as GenericChatRequest.system on every call.
  # Keep concise: the model sees this before the user prompt.
  system_message: >-
    You are an OCI solutions architect and layout compiler.
    When given a list of OCI services, output ONLY valid JSON —
    either a LayoutIntent specification or a clarification request object.
    No markdown fences, no explanation, no preamble.
    Every response must start with '{' and end with '}'.

# Artifact persistence
persistence:
  enabled: true
  backend: "oci_object_storage"
  region: "us-chicago-1"
  namespace: "oraclejamescalise"
  bucket_name: "agent_assistante"
  prefix: "agent3"
  store_inputs: false   # set true only after internal approval

# Writing agents (POV + JEP document generation)
# These share the same OCI GenAI inference endpoint but use different
# temperature/token settings for long-form document writing.
writing:
  # max_tokens for document generation (longer than diagram JSON)
  max_tokens: 4000
  # temperature > 0 for creative/narrative writing
  temperature: 0.7
  top_p: 0.9
  top_k: 0

  # POV agent system message (can override agent/pov_agent.py default)
  pov:
    system_message: ""   # leave empty to use the default in pov_agent.py

  # JEP agent system message (can override agent/jep_agent.py default)
  jep:
    system_message: ""   # leave empty to use the default in jep_agent.py

# Server
host: "0.0.0.0"
port: 8080
output_dir: "/tmp/diagrams"
