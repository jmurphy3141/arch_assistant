[pytest]
markers =
    unit: fast isolated tests for pure functions and narrow units
    integration: cross-module tests with in-process fakes/mocks
    system: API and multi-step workflow tests with deterministic dependencies
    e2e: end-to-end behavior tests with stable mocked contracts
    prompt_static: deterministic recursive prompt contract checks (PR gate)
    prompt_judge: judge-based recursive prompt quality checks (nightly/manual)
    live: tests that call external LLM APIs (opt-in only)
